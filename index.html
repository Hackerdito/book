    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #020617;
        color: white;
        margin: 0;
        overflow-x: hidden; /* Allow vertical scroll, prevent horizontal */
      }
      
      /* Custom Animations */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      /* Single flash effect for progress bars */
      @keyframes flash-success {
        0% { filter: brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0)); }
        50% { filter: brightness(2) drop-shadow(0 0 10px rgba(99, 102, 241, 0.6)); }
        100% { filter: brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0)); }
      }

      .animate-flash {
        animation: flash-success 0.6s ease-out forwards;
      }

      .perspective-container {
        perspective: 1000px;
      }
    </style>
